# CxImage Workflow Fix Windows Msvc Compile Errors

## Action

Follow the fix-windows-msvc-compile-errors workflow:
1. Identify MSVC-specific compile errors and warnings.
2. Guard GCC/Unix-specific code (e.g., unistd.h includes, compiler flags) with MSVC checks in headers and CMakeLists.txt.
3. Update function signatures, casts, and types (e.g., pointer types, enum naming, narrowing conversions) to satisfy MSVC.
4. Adjust usage of standard library functions (e.g., use _lfind and include search.h for MSVC).
5. Repeat these changes across multiple modules (jasper, tiff, zlib, libpsd, CxImage/*, CMakeLists.txt).
6. Commit changes with a detailed message listing all affected files and fixes.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: CMakeLists.txt, jasper/jpc/jpc_qmfb.c, jasper/jpc/jpc_tsfb.c

